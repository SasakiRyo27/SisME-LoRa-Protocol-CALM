{% extends 'base.html' %}

{% block title %}Registro Exitoso - SisME LoRa{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <div class="card shadow">
            <div class="card-body py-5">
                <div class="mb-4">
                    <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
                </div>
                <h2 class="card-title mb-3">¡Registro Completado!</h2>
                <p class="lead text-muted mb-4">
                    Tu cuenta ha sido creada exitosamente. Ahora puedes iniciar sesión para acceder al chat de emergencia.
                </p>
                <div class="d-grid gap-2 col-mx-auto">
                    <a href="{% url 'login' %}" class="btn btn-primary btn-lg">
                        Ir al Inicio de Sesión
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Opcional: Redirigir automáticamente después de 5 segundos
    setTimeout(function() {
        window.location.href = "{% url 'login' %}";
    }, 5000);
</script>
{% endblock %}
