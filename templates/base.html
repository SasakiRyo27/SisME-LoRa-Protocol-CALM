{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SisME LoRa{% endblock %}</title>
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'icons/bootstrap-icons.css' %}">
    <style>
        body { background-color: #f8f9fa; font-size: 0.95rem; }
        .chat-container { max-width: 800px; margin: 1rem auto; padding: 0 10px; }
        .chat-box { background: white; border-radius: 10px; padding: 1rem; height: calc(100vh - 250px); min-height: 400px; overflow-y: scroll; border: 1px solid #dee2e6; }
        .message { margin-bottom: 0.8rem; padding: 0.6rem; border-radius: 10px; max-width: 85%; }
        .message-sent { background-color: #e3f2fd; align-self: flex-end; border-bottom-right-radius: 2px; }
        .message-received { background-color: #f1f1f1; border-bottom-left-radius: 2px; }
        .message-header { font-size: 0.75rem; color: #6c757d; margin-bottom: 2px; }
        .emergency-header { background-color: #dc3545; color: white; padding: 0.8rem; border-radius: 10px 10px 0 0; }
        input[type="text"], input[type="password"], input[type="email"] { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid #ced4da; border-radius: 0.375rem; }
        .btn-toggle-password { background: none; border: none; padding: 0; color: #6c757d; }
        
        /* Mobile optimizations */
        @media (max-width: 576px) {
            .chat-box { height: calc(100vh - 220px); padding: 0.5rem; }
            .message { max-width: 90%; font-size: 0.9rem; }
            .emergency-header h4 { font-size: 1.1rem; }
            .navbar-brand { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'chat_room' %}">SisME LoRa</a>
            <div class="navbar-nav ms-auto">
                {% if user.is_authenticated %}
                    <a class="nav-link text-light" href="{% url 'edit_profile' %}">
                        <i class="bi bi-person-circle"></i> {{ user.username }}
                    </a>
                    <form action="{% url 'logout' %}" method="post" class="d-inline">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-link nav-link">Cerrar Sesión</button>
                    </form>
                {% else %}
                    <a class="nav-link" href="{% url 'login' %}">Iniciar Sesión</a>
                    <a class="nav-link" href="{% url 'register' %}">Registrarse</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
